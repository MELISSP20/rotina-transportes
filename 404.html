<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet"/>
<meta http-equiv="X-Frame-Options" content="DENY"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com; frame-ancestors 'none';"/>
<meta name="referrer" content="no-referrer"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/png" sizes="48x48" href="favicon.png"/>
<title>404 — Rota não encontrada · Assignments</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #FFE600; --navy: #1A1A2E; --font: 'Inter', sans-serif;
    --bg: #F5F5F5; --surface: #FFFFFF; --text: #333333; --muted: #666666; --border: #E0E0E0;
    --red: #E3262F; --green: #00A650; --purple: #a78bfa;
  }
  [data-theme="dark"] {
    --bg: #0F1117; --surface: #1A1D27; --text: #E8EAF2; --muted: #8B90A7; --border: #2A2E3F;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 10%; right: -15%;
    width: 720px; height: 720px;
    background: radial-gradient(circle, rgba(255,230,0,.16) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -20%; left: -15%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(227,38,47,.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  [data-theme="dark"] body::before { background: radial-gradient(circle, rgba(255,230,0,.08) 0%, transparent 65%); }

  .container { position: relative; z-index: 1; text-align: center; max-width: 580px; }

  .truck-wrap {
    margin: 0 auto 30px;
    width: 200px;
    height: 120px;
    position: relative;
    animation: truckBob 3s ease-in-out infinite;
  }
  @keyframes truckBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .road {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: var(--border);
    overflow: hidden;
  }
  .road::before {
    content: '';
    position: absolute;
    top: 1.5px;
    left: 0;
    width: 100%;
    height: 1px;
    background-image: repeating-linear-gradient(90deg, var(--yellow) 0, var(--yellow) 10px, transparent 10px, transparent 20px);
    animation: roadMove 1.5s linear infinite;
  }
  @keyframes roadMove { from { transform: translateX(0); } to { transform: translateX(-20px); } }

  .label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .24em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .label-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: labelPulse 1.5s infinite;
  }
  @keyframes labelPulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .number {
    font-size: clamp(120px, 22vw, 200px);
    font-weight: 900;
    line-height: .9;
    color: var(--navy);
    letter-spacing: -8px;
    margin-bottom: 18px;
  }
  [data-theme="dark"] .number { color: #fff; }
  .number-dot { color: var(--yellow); }

  .title {
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 900;
    color: var(--text);
    letter-spacing: -1.2px;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .desc {
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 32px;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }
  .desc b { color: var(--text); font-weight: 800; }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 22px;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 800;
    text-decoration: none;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    border: 1px solid transparent;
    cursor: pointer;
  }
  .btn-primary { background: var(--navy); color: var(--yellow); box-shadow: 0 4px 14px rgba(26,26,46,.18); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(26,26,46,.28); }
  [data-theme="dark"] .btn-primary { background: var(--yellow); color: var(--navy); }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--text); transform: translateY(-1px); }

  .hint {
    margin-top: 28px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .14em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: .6;
  }
  .hint kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    padding: 3px 8px;
    border-radius: 5px;
    font-family: ui-monospace, monospace;
    font-size: 10px;
    margin: 0 3px;
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="truck-wrap">
      <svg viewBox="0 0 200 120" width="200" height="120">
        <!-- Caminhão estilizado -->
        <g fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" style="color: var(--navy);">
          <!-- carroceria -->
          <rect x="20" y="40" width="100" height="55" rx="3"/>
          <!-- cabine -->
          <path d="M120 55 L150 55 L165 70 L165 95 L120 95 Z"/>
          <!-- janela cabine -->
          <path d="M125 60 L150 60 L160 70 L125 70 Z" fill="rgba(255,230,0,.5)"/>
          <!-- rodas -->
          <circle cx="45" cy="100" r="10" fill="var(--bg)"/>
          <circle cx="45" cy="100" r="4" fill="var(--navy)"/>
          <circle cx="135" cy="100" r="10" fill="var(--bg)"/>
          <circle cx="135" cy="100" r="4" fill="var(--navy)"/>
          <!-- detalhe ML -->
          <text x="70" y="73" font-family="Inter" font-weight="900" font-size="14" fill="var(--navy)" stroke="none">?</text>
        </g>
      </svg>
      <div class="road"></div>
    </div>

    <div class="label"><span class="label-dot"></span> ROTA NÃO ENCONTRADA</div>
    <div class="number">4<span class="number-dot">0</span>4</div>
    <div class="title">Essa parada saiu da rota.</div>
    <div class="desc">
      O endereço que você procurou <b>não existe</b> no Assignments — pode ter sido descontainerizado, faltante aduana ou simplesmente um typo no link.
    </div>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">
        🏠 Voltar pro Hub
      </a>
      <a href="rotina.html" class="btn btn-secondary">
        📋 Ir pra Rotina
      </a>
    </div>

    <div class="hint">Aperte <kbd>?</kbd> a qualquer momento pra ver atalhos</div>
  </div>

  <script>
    // Tema persistido
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
  <script src="keyboard.js?v=20260628" defer></script>
<script src="toast.js?v=20260628" defer></script>
<script src="ssp-city.js?v=20260628" defer></script>
<script src="easter-eggs.js?v=20260628" defer></script>
</body>
</html>
